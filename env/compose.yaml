services:
  postgres:
    image: postgres:16-alpine
    container_name: kutu-postgres
    environment:
      POSTGRES_USER: kutu
      POSTGRES_PASSWORD: kutu
      POSTGRES_DB: kutu
    ports:
      - "5432:5432"
    volumes:
      - kutu-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kutu"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kutu-pgdata:
